services:
  local-codex-kit:
    build:
      context: .
      args:
        LOCAL_CODEX_OLLAMA_PULL_MODELS: ${LOCAL_CODEX_OLLAMA_PULL_MODELS:-gpt-oss:20b}
    image: allsagetech/local-codex-kit:latest
    network_mode: "none"
    stdin_open: true
    tty: true
    working_dir: /workspace
    ports: []
    expose: []
    environment:
      LOCAL_CODEX_WORKSPACE: /workspace
      LOCAL_CODEX_OLLAMA_PULL_MODELS: ${LOCAL_CODEX_OLLAMA_PULL_MODELS:-gpt-oss:20b}
      LOCAL_CODEX_OLLAMA_ENABLE: ${LOCAL_CODEX_OLLAMA_ENABLE:-1}
      LOCAL_CODEX_OLLAMA_PORT: ${LOCAL_CODEX_OLLAMA_PORT:-11434}
      LOCAL_CODEX_OLLAMA_MODEL_ALIAS: ${LOCAL_CODEX_OLLAMA_MODEL_ALIAS:-}
      LOCAL_CODEX_OLLAMA_STARTUP_TIMEOUT_SEC: ${LOCAL_CODEX_OLLAMA_STARTUP_TIMEOUT_SEC:-300}
      LOCAL_CODEX_OLLAMA_REQUIRE_READY: ${LOCAL_CODEX_OLLAMA_REQUIRE_READY:-0}
    volumes:
      - local-codex-kit-workspace:/workspace
      - local-codex-kit-ollama:/root/.ollama

volumes:
  local-codex-kit-workspace:
  local-codex-kit-ollama:
