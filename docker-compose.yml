services:
  local-codex-kit:
    build:
      context: .
      args:
        LOCAL_CODEX_OLLAMA_PULL_MODELS: ${LOCAL_CODEX_OLLAMA_PULL_MODELS:-qwen2.5-coder:7b}
    image: allsagetech/local-codex-kit:latest
    network_mode: "none"
    stdin_open: true
    tty: true
    working_dir: /workspace
    ports: []
    expose: []
    environment:
      CODEX_HOME: /root/.codex
      LOCAL_CODEX_WORKSPACE: /workspace
      LOCAL_CODEX_OLLAMA_PULL_MODELS: ${LOCAL_CODEX_OLLAMA_PULL_MODELS:-qwen2.5-coder:7b}
      LOCAL_CODEX_OLLAMA_ENABLE: ${LOCAL_CODEX_OLLAMA_ENABLE:-1}
      LOCAL_CODEX_OLLAMA_PORT: ${LOCAL_CODEX_OLLAMA_PORT:-11434}
      LOCAL_CODEX_OLLAMA_MODEL_ALIAS: ${LOCAL_CODEX_OLLAMA_MODEL_ALIAS:-}
      LOCAL_CODEX_OLLAMA_CONTEXT_LENGTH: ${LOCAL_CODEX_OLLAMA_CONTEXT_LENGTH:-65536}
      LOCAL_CODEX_OLLAMA_STARTUP_TIMEOUT_SEC: ${LOCAL_CODEX_OLLAMA_STARTUP_TIMEOUT_SEC:-300}
      LOCAL_CODEX_OLLAMA_REQUIRE_READY: ${LOCAL_CODEX_OLLAMA_REQUIRE_READY:-0}
      LOCAL_CODEX_CODEX_APPROVAL_POLICY: ${LOCAL_CODEX_CODEX_APPROVAL_POLICY:-on-request}
      LOCAL_CODEX_CODEX_SANDBOX_MODE: ${LOCAL_CODEX_CODEX_SANDBOX_MODE:-danger-full-access}
    volumes:
      - local-codex-kit-workspace:/workspace
      - local-codex-kit-ollama-qwen:/root/.ollama
      - local-codex-kit-codex:/root/.codex

volumes:
  local-codex-kit-workspace:
  local-codex-kit-ollama-qwen:
  local-codex-kit-codex:
