name: local-ollama-kit

services:
  local-ollama-kit:
    build:
      context: .
      args:
        LOCAL_OLLAMA_BASE_IMAGE: ${LOCAL_OLLAMA_BASE_IMAGE:-ubuntu:22.04}
        LOCAL_OLLAMA_PULL_MODELS: ${LOCAL_OLLAMA_PULL_MODELS:-qwen2.5-coder:14b}
    image: allsagetech/local-ollama-kit:latest
    network_mode: "none"
    init: true
    stdin_open: true
    tty: true
    read_only: true
    working_dir: /workspace
    ports: []
    expose: []
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:exec,mode=1777
      - /run:mode=755
    environment:
      HOME: /home/ollama
      LOCAL_OLLAMA_WORKSPACE: /workspace
      LOCAL_OLLAMA_MODELS: /opt/local-ollama-kit/ollama-models
      LOCAL_OLLAMA_PULL_MODELS: ${LOCAL_OLLAMA_PULL_MODELS:-qwen2.5-coder:14b}
      LOCAL_OLLAMA_ENABLE: ${LOCAL_OLLAMA_ENABLE:-1}
      LOCAL_OLLAMA_PORT: ${LOCAL_OLLAMA_PORT:-11434}
      LOCAL_OLLAMA_MODEL_ALIAS: ${LOCAL_OLLAMA_MODEL_ALIAS:-}
      LOCAL_OLLAMA_CONTEXT_LENGTH: ${LOCAL_OLLAMA_CONTEXT_LENGTH:-65536}
      LOCAL_OLLAMA_STARTUP_TIMEOUT_SEC: ${LOCAL_OLLAMA_STARTUP_TIMEOUT_SEC:-300}
      LOCAL_OLLAMA_REQUIRE_READY: ${LOCAL_OLLAMA_REQUIRE_READY:-0}
    volumes:
      - local-ollama-kit-workspace:/workspace
      - local-ollama-kit-home:/home/ollama/.ollama
      - type: bind
        source: ${LOCAL_OLLAMA_HOST_PROJECT_PATH:-./host-project}
        target: /workspace/project

volumes:
  local-ollama-kit-workspace:
  local-ollama-kit-home:
