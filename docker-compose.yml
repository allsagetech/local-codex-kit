services:
  local-codex-kit:
    build:
      context: .
      args:
        TOOLCHAIN_REPO_URL: ${LOCAL_CODEX_TOOLCHAIN_REPO_URL:-https://github.com/allsagetech/Toolchain.git}
        TOOLCHAIN_REPO_REF: ${LOCAL_CODEX_TOOLCHAIN_REPO_REF:-main}
        LOCAL_CODEX_TOOLCHAIN_CODEX_PKG: ${LOCAL_CODEX_TOOLCHAIN_CODEX_PKG:-codex:codex-0.106.0-linux}
        LOCAL_CODEX_TOOLCHAIN_GIT_PKG: ${LOCAL_CODEX_TOOLCHAIN_GIT_PKG:-}
        LOCAL_CODEX_TOOLCHAIN_LLVM_PKG: ${LOCAL_CODEX_TOOLCHAIN_LLVM_PKG:-}
        LLAMA_CPP_REPO_URL: ${LOCAL_CODEX_LLAMA_CPP_REPO_URL:-https://github.com/ggml-org/llama.cpp.git}
        LLAMA_CPP_REPO_REF: ${LOCAL_CODEX_LLAMA_CPP_REPO_REF:-master}
        LOCAL_CODEX_EMBEDDED_MODEL_FILE: ${LOCAL_CODEX_EMBEDDED_MODEL_FILE:-qwen2.5-coder-7b-instruct-q4_k_m.gguf}
        LOCAL_CODEX_EMBEDDED_MODEL_URL: ${LOCAL_CODEX_EMBEDDED_MODEL_URL:-}
        LOCAL_CODEX_EMBEDDED_MODEL_SHA256: ${LOCAL_CODEX_EMBEDDED_MODEL_SHA256:-}
    image: allsagetech/local-codex-kit:latest
    network_mode: "none"
    stdin_open: true
    tty: true
    working_dir: /workspace
    ports: []
    expose: []
    environment:
      LOCAL_CODEX_CONTAINER_MODE: "1"
      LOCAL_CODEX_WORKSPACE: /workspace
      LOCAL_CODEX_TOOLCHAIN_MODULE_PATH: /opt/powershell-modules
      LOCAL_CODEX_LLVM_BASE_URL: ${LOCAL_CODEX_LLVM_BASE_URL:-http://127.0.0.1:8000/v1}
      LOCAL_CODEX_LLVM_MODEL: ${LOCAL_CODEX_LLVM_MODEL:-qwen2.5-coder-7b-instruct}
      LOCAL_CODEX_LLVM_WIRE_API: ${LOCAL_CODEX_LLVM_WIRE_API:-chat}
      LOCAL_CODEX_USE_LLVM_TOOLCHAIN: ${LOCAL_CODEX_USE_LLVM_TOOLCHAIN:-0}
      LOCAL_CODEX_USE_HOST_LMSTUDIO: "0"
      LOCAL_CODEX_TOOLCHAIN_CODEX_PKG: ${LOCAL_CODEX_TOOLCHAIN_CODEX_PKG:-codex:codex-0.106.0-linux}
      LOCAL_CODEX_TOOLCHAIN_GIT_PKG: ${LOCAL_CODEX_TOOLCHAIN_GIT_PKG:-}
      LOCAL_CODEX_TOOLCHAIN_LLVM_PKG: ${LOCAL_CODEX_TOOLCHAIN_LLVM_PKG:-}
      LOCAL_CODEX_EMBEDDED_MODEL_PATH: ${LOCAL_CODEX_EMBEDDED_MODEL_PATH:-/opt/models/qwen2.5-coder-7b-instruct-q4_k_m.gguf}
      LOCAL_CODEX_EMBEDDED_MODEL_ALIAS: ${LOCAL_CODEX_EMBEDDED_MODEL_ALIAS:-qwen2.5-coder-7b-instruct}
      LOCAL_CODEX_EMBEDDED_CONTEXT: ${LOCAL_CODEX_EMBEDDED_CONTEXT:-8192}
      LOCAL_CODEX_EMBEDDED_GPU_LAYERS: ${LOCAL_CODEX_EMBEDDED_GPU_LAYERS:-0}
      LOCAL_CODEX_EMBEDDED_PORT: ${LOCAL_CODEX_EMBEDDED_PORT:-8000}
      LOCAL_CODEX_EMBEDDED_STARTUP_TIMEOUT_SEC: ${LOCAL_CODEX_EMBEDDED_STARTUP_TIMEOUT_SEC:-300}
      LOCAL_CODEX_EMBEDDED_REQUIRE_READY: ${LOCAL_CODEX_EMBEDDED_REQUIRE_READY:-0}
      ToolchainPath: /opt/toolchain-cache
      ToolchainRepo: /opt/toolchain-repo
      ToolchainPullPolicy: Always
    volumes:
      - local-codex-kit-workspace:/workspace
      - local-codex-kit-toolchain-cache:/opt/toolchain-cache
      - local-codex-kit-models:/opt/models
      - local-codex-kit-codex:/root/.codex

volumes:
  local-codex-kit-workspace:
  local-codex-kit-toolchain-cache:
  local-codex-kit-models:
  local-codex-kit-codex:
